<!DOCTYPE html>
<html>
<head>
    <title>Isaac's World</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            height: 100vh;
            background-image: url("fondo 2.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        h1 {
            position: absolute;
            top: 40px;
            width: 100%;
            font-size: 40px;
            text-shadow: 0 0 10px white, 0 0 20px #00ccff;
            z-index: 2;
        }

        /* ⭐ Estrellas */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from {
                transform: translateY(-10px);
                opacity: 1;
            }
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        /* 🔥 BOTÓN */
        button {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            padding: 20px 50px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background: rgba(0, 255, 200, 0.85);
            color: black;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            z-index: 3;
        }

        button:hover {
            background: rgba(0, 255, 200, 1);
            transform: translateX(-50%) scale(1.05);
        }

            </style>
</head>

<body>

    <h1>Isaac's World</h1>

    <button onclick="goToBlog()">Enter Blog</button>

    <script>
        function goToBlog() {
            window.location.href = "blog.html";
        }

        // ⭐ Estrellas
        for (let i = 0; i < 80; i++) {
            let star = document.createElement("div");
            star.classList.add("star");

            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            star.style.animationDuration = (Math.random() * 5 + 3) + "s";

            document.body.appendChild(star);
        }
    </script>

</body>
</html>
